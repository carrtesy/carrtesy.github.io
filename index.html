<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dongmin Kim | AI Research Scientist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Hero Section -->
        <header class="hero">
            <img id="profile-img" src="" alt="" class="profile-img">
            <h1 id="profile-name"></h1>
            <p class="title" id="profile-title"></p>
            <div class="social-links" id="social-links"></div>
        </header>

        <!-- About Section -->
        <section class="section" id="about">
            <h2>About Me</h2>
            <p id="about-text"></p>
        </section>

        <!-- Experience Section -->
        <section class="section" id="experience">
            <h2>Experience</h2>
            <div class="timeline" id="experience-list"></div>
        </section>

        <!-- Education Section -->
        <section class="section" id="education">
            <h2>Education</h2>
            <div class="timeline" id="education-list"></div>
        </section>

        <!-- Publications Section -->
        <section class="section" id="publications">
            <h2>Publications</h2>
            <ul class="publication-list" id="publication-list"></ul>
        </section>

        <!-- Footer -->
        <footer id="footer"></footer>
    </div>

    <!-- Paper Modal -->
    <div id="paper-modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <span id="modal-venue" class="pub-venue"></span>
                <p id="modal-authors" class="modal-authors"></p>
                <div id="modal-links" class="pub-links"></div>
            </div>
            <div class="modal-split">
                <div id="modal-story" class="modal-story"></div>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>
    </div>

    <script>
        // SVG Icons
        const icons = {
            linkedin: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,
            github: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>`,
            scholar: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M5.242 13.769L0 9.5 12 0l12 9.5-5.242 4.269C17.548 11.249 14.978 9.5 12 9.5c-2.977 0-5.548 1.748-6.758 4.269zM12 10a7 7 0 1 0 0 14 7 7 0 0 0 0-14z"/></svg>`,
            email: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M0 3v18h24v-18h-24zm21.518 2l-9.518 7.713-9.518-7.713h19.036zm-19.518 14v-11.817l10 8.104 10-8.104v11.817h-20z"/></svg>`,
            expand: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg>`
        };

        let profileData = {};
        let publicationsData = [];
        let experienceData = [];
        let educationData = [];

        // Modal functions
        function openModal(index) {
            const pub = publicationsData[index];
            const modal = document.getElementById('paper-modal');

            document.getElementById('modal-title').textContent = pub.title;
            document.getElementById('modal-venue').textContent = pub.venue;
            document.getElementById('modal-authors').innerHTML = pub.authors;

            // Links
            const linksHTML = pub.links.length > 0
                ? pub.links.map(link => `<a href="${link.url}" target="_blank">[${link.label}]</a>`).join('')
                : '';
            document.getElementById('modal-links').innerHTML = linksHTML;

            // Story with profile
            const storyEl = document.getElementById('modal-story');
            if (pub.story && pub.story.trim() !== '') {
                storyEl.innerHTML = `
                    <div class="story-message">
                        <img src="${profileData.image}" alt="${profileData.name}" class="story-avatar">
                        <div class="story-bubble">
                            <p>${pub.story}</p>
                            ${pub.storyDate ? `<span class="story-date">${pub.storyDate}</span>` : ''}
                        </div>
                    </div>
                `;
                storyEl.style.display = 'flex';
            } else {
                storyEl.style.display = 'none';
            }

            // Body content (PDF or Blog)
            const bodyEl = document.getElementById('modal-body');
            if (pub.blogUrl) {
                // Fetch blog content
                bodyEl.innerHTML = '<div class="loading">Loading content...</div>';
                bodyEl.style.display = 'block';
                fetchBlogContent(pub.blogUrl, bodyEl);
            } else if (pub.pdf) {
                bodyEl.innerHTML = `<iframe src="${pub.pdf}" frameborder="0"></iframe>`;
                bodyEl.style.display = 'block';
            } else {
                bodyEl.innerHTML = '<p class="no-content">Content not available yet.</p>';
                bodyEl.style.display = 'block';
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        async function fetchLinkPreview(url, container) {
            container.innerHTML = '<div class="link-preview-loading">Loading preview...</div>';
            try {
                const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                const meta = data.data || {};
                const title = meta.title || '';
                const description = meta.description || '';
                const image = meta.image && meta.image.url ? meta.image.url : '';
                const siteName = meta.publisher || new URL(url).hostname;

                container.innerHTML = `
                    <div class="link-preview-wrap">
                        <a href="${url}" target="_blank" class="link-preview-card">
                            ${image ? `<img src="${image}" alt="${title}" class="link-preview-img">` : ''}
                            <div class="link-preview-body">
                                <span class="link-preview-site">${siteName}</span>
                                <p class="link-preview-title">${title}</p>
                                ${description ? `<p class="link-preview-desc">${description}</p>` : ''}
                            </div>
                        </a>
                    </div>
                `;
            } catch (e) {
                container.innerHTML = `
                    <div class="link-preview-wrap">
                        <a href="${url}" target="_blank" class="link-preview-card link-preview-fallback">
                            <div class="link-preview-body">
                                <span class="link-preview-site">${new URL(url).hostname}</span>
                                <p class="link-preview-title">${url}</p>
                            </div>
                        </a>
                    </div>
                `;
            }
        }

        function fetchBlogContent(url, container) {
            fetchLinkPreview(url, container);
        }

        function closeModal() {
            const modal = document.getElementById('paper-modal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('modal-body').innerHTML = '';
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Close modal on backdrop click
        document.getElementById('paper-modal').addEventListener('click', (e) => {
            if (e.target.id === 'paper-modal') closeModal();
        });

        // Load all data
        async function loadData() {
            try {
                const [profile, about, experience, education, publications, footer] = await Promise.all([
                    fetch('data/profile.json').then(r => r.json()),
                    fetch('data/about.json').then(r => r.json()),
                    fetch('data/experience.json').then(r => r.json()),
                    fetch('data/education.json').then(r => r.json()),
                    fetch('data/publications.json').then(r => r.json()),
                    fetch('data/footer.json').then(r => r.json())
                ]);

                profileData = profile;
                publicationsData = publications;
                educationData = education;

                renderProfile(profile);
                renderAbout(about);
                renderExperience(experience);
                renderEducation(education);
                renderPublications(publications);
                renderFooter(footer);
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function renderProfile(data) {
            document.getElementById('profile-img').src = data.image;
            document.getElementById('profile-img').alt = data.name;
            document.getElementById('profile-name').textContent = data.name;
            document.getElementById('profile-title').textContent = data.title;

            const socialLinks = document.getElementById('social-links');
            let socialHTML = '';
            if (data.social.linkedin) socialHTML += `<a href="${data.social.linkedin}" target="_blank" title="LinkedIn">${icons.linkedin}</a>`;
            if (data.social.github) socialHTML += `<a href="${data.social.github}" target="_blank" title="GitHub">${icons.github}</a>`;
            if (data.social.scholar) socialHTML += `<a href="${data.social.scholar}" target="_blank" title="Google Scholar">${icons.scholar}</a>`;
            if (data.email) socialHTML += `<a href="mailto:${data.email}" title="Email">${icons.email}</a>`;
            socialLinks.innerHTML = socialHTML;
        }

        function renderAbout(data) {
            document.getElementById('about-text').textContent = data.text;
        }

        function openExperienceModal(index) {
            const exp = experienceData[index];
            document.getElementById('modal-title').textContent = exp.title;
            document.getElementById('modal-venue').textContent = exp.date;
            document.getElementById('modal-authors').textContent = exp.organization;
            document.getElementById('modal-links').innerHTML = exp.link
                ? `<a href="${exp.link}" target="_blank" onclick="event.stopPropagation()">[News]</a>`
                : '';

            const storyEl = document.getElementById('modal-story');
            if (exp.story) {
                storyEl.innerHTML = `
                    <div class="story-message">
                        <img src="${profileData.image}" alt="${profileData.name}" class="story-avatar">
                        <div class="story-bubble">
                            <p>${exp.story}</p>
                            ${exp.storyDate ? `<span class="story-date">${exp.storyDate}</span>` : ''}
                        </div>
                    </div>
                `;
                storyEl.style.display = 'flex';
            } else {
                storyEl.style.display = 'none';
            }

            const bodyEl = document.getElementById('modal-body');
            bodyEl.style.display = 'block';
            fetchLinkPreview(exp.link, bodyEl);

            document.getElementById('paper-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function renderExperience(data) {
            experienceData = data;
            const list = document.getElementById('experience-list');
            list.innerHTML = data.map((exp, index) => {
                const hasDetail = exp.story || exp.link;
                const orgHTML = exp.link
                    ? `<a href="${exp.link}" target="_blank" class="organization-link" onclick="event.stopPropagation()">${exp.organization}</a>`
                    : exp.organization;
                const expandIcon = hasDetail
                    ? `<span class="expand-icon">${icons.expand}</span>`
                    : '';
                return `
                    <div class="timeline-item ${hasDetail ? 'clickable' : ''}" ${hasDetail ? `onclick="openExperienceModal(${index})"` : ''}>
                        <div class="timeline-date">${exp.date}</div>
                        <div class="timeline-content">
                            <h3>${exp.title}${expandIcon}</h3>
                            <p class="organization">${orgHTML}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openEducationModal(index) {
            const edu = educationData[index];
            document.getElementById('modal-title').textContent = edu.title;
            document.getElementById('modal-venue').textContent = edu.date;
            document.getElementById('modal-authors').textContent = edu.organization;
            document.getElementById('modal-links').innerHTML = edu.link
                ? `<a href="${edu.link}" target="_blank" onclick="event.stopPropagation()">[Website]</a>`
                : '';

            const storyEl = document.getElementById('modal-story');
            if (edu.story) {
                storyEl.innerHTML = `
                    <div class="story-message">
                        <img src="${profileData.image}" alt="${profileData.name}" class="story-avatar">
                        <div class="story-bubble">
                            <p>${edu.story}</p>
                            ${edu.storyDate ? `<span class="story-date">${edu.storyDate}</span>` : ''}
                        </div>
                    </div>
                `;
                storyEl.style.display = 'flex';
            } else {
                storyEl.style.display = 'none';
            }

            const bodyEl = document.getElementById('modal-body');
            if (edu.media) {
                if (edu.mediaType === 'video') {
                    bodyEl.innerHTML = `<video src="${edu.media}" class="edu-media" autoplay loop muted playsinline></video>`;
                } else {
                    bodyEl.innerHTML = `<img src="${edu.media}" alt="${edu.title}" class="edu-media">`;
                }
                bodyEl.style.display = 'block';
            } else {
                bodyEl.innerHTML = '';
                bodyEl.style.display = 'none';
            }

            document.getElementById('paper-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function renderEducation(data) {
            educationData = data;
            const list = document.getElementById('education-list');
            list.innerHTML = data.map((edu, index) => {
                const hasDetail = edu.story || edu.media;
                const orgHTML = edu.link
                    ? `<a href="${edu.link}" target="_blank" class="organization-link" onclick="event.stopPropagation()">${edu.organization}</a>`
                    : edu.organization;
                const expandIcon = hasDetail
                    ? `<span class="expand-icon">${icons.expand}</span>`
                    : '';
                return `
                    <div class="timeline-item ${hasDetail ? 'clickable' : ''}" ${hasDetail ? `onclick="openEducationModal(${index})"` : ''}>
                        <div class="timeline-date">${edu.date}</div>
                        <div class="timeline-content">
                            <h3>${edu.title}${expandIcon}</h3>
                            <p class="organization">${orgHTML}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPublications(data) {
            const list = document.getElementById('publication-list');
            list.innerHTML = data.map((pub, index) => {
                const imageHTML = pub.image ? `<img src="${pub.image}" alt="${pub.title}" class="pub-image">` : '';
                const linksHTML = pub.links.length > 0
                    ? `<div class="pub-links">${pub.links.map(link =>
                        `<a href="${link.url}" target="_blank" onclick="event.stopPropagation()">[${link.label}]</a>`
                      ).join('')}</div>`
                    : '';

                const hasDetail = pub.pdf || pub.blogUrl || (pub.story && pub.story.trim() !== '');
                const expandIcon = hasDetail ? `<span class="expand-icon" title="Click to view details">${icons.expand}</span>` : '';

                return `
                    <li class="publication-item ${hasDetail ? 'clickable' : ''}" ${hasDetail ? `onclick="openModal(${index})"` : ''}>
                        ${imageHTML}
                        <div class="pub-content">
                            <span class="pub-title">${pub.title}${expandIcon}</span>
                            <span class="pub-venue">${pub.venue}</span>
                            <span class="pub-authors">${pub.authors}</span>
                            ${linksHTML}
                        </div>
                    </li>
                `;
            }).join('');
        }

        function renderFooter(data) {
            document.getElementById('footer').innerHTML = `<p>&copy; ${data.year} ${data.name}. All rights reserved.</p>`;
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
